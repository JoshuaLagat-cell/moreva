services: 
  - type: web 
    name: moreva-energy 
    env: node 
    buildCommand: npm install 
    startCommand: node src/server.js 
    envVars: 
      - key: NODE_ENV 
        value: production 
      - key: PORT 
        value: 10000 
      - key: JWT_SECRET 
        generateValue: true 
      - key: DB_HOST 
        sync: false 
      - key: DB_PORT 
        sync: false 
      - key: DB_NAME 
        sync: false 
      - key: DB_USER 
        sync: false 
      - key: DB_PASSWORD 
        sync: false 
      - key: DB_SSL 
