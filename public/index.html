<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>MOREVA ENERGY · Secure Access Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0f1c 0%, #0f172a 50%, #1e1b2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
    }
    
    /* Animated background particles */
    body::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(30,58,138,0.1) 0%, transparent 50%);
      pointer-events: none;
    }
    
    body::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 80% 80%, rgba(185,28,28,0.08) 0%, transparent 50%);
      pointer-events: none;
    }
    
    .glass-card {
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.98);
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255,255,255,0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
      z-index: 1;
    }
    
    .glass-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3);
    }
    
    .brand-icon {
      background: linear-gradient(135deg, #1e3a8a, #dc2626);
      width: 72px;
      height: 72px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 2rem;
      color: white;
      margin: 0 auto;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
    }
    
    .brand-icon:hover {
      transform: scale(1.05);
    }
    
    .toast-notif {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: #1e293b;
      color: white;
      padding: 12px 24px;
      border-radius: 48px;
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
      animation: slideUp 0.3s ease;
      white-space: nowrap;
      max-width: 90%;
      white-space: normal;
      text-align: center;
      line-height: 1.4;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
    
    .input-field {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      transition: all 0.2s;
      font-size: 0.95rem;
      background: #fff;
      font-weight: 500;
    }
    
    .input-field:focus {
      outline: none;
      border-color: #1e3a8a;
      box-shadow: 0 0 0 3px rgba(30,58,138,0.1);
    }
    
    .input-field.error {
      border-color: #dc2626;
      background: #fef2f2;
    }
    
    .btn-primary {
      background: linear-gradient(105deg, #1e3a8a, #dc2626);
      color: white;
      font-weight: 600;
      padding: 14px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      font-size: 1rem;
      position: relative;
      overflow: hidden;
    }
    
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    
    .btn-primary:hover::before {
      left: 100%;
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px -6px rgba(185,28,28,0.4);
    }
    
    .btn-primary:active {
      transform: translateY(1px);
    }
    
    .btn-google {
      background: white;
      color: #1f2937;
      font-weight: 500;
      padding: 12px;
      border-radius: 16px;
      border: 2px solid #e2e8f0;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    
    .btn-google:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
      transform: translateY(-1px);
    }
    
    .tab-btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.2s;
      cursor: pointer;
      text-align: center;
    }
    
    .tab-active {
      background: #1e3a8a;
      color: white;
      box-shadow: 0 2px 8px rgba(30,58,138,0.2);
    }
    
    .tab-inactive {
      background: transparent;
      color: #64748b;
    }
    
    .tab-inactive:hover {
      background: rgba(100,116,139,0.1);
    }
    
    .loading-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none !important;
    }
    
    .strength-meter {
      height: 4px;
      border-radius: 4px;
      margin-top: 8px;
      background: #e2e8f0;
      overflow: hidden;
    }
    
    .strength-bar {
      height: 100%;
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s ease, background 0.2s;
    }
    
    .password-hint {
      font-size: 0.7rem;
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .hint-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
    }
    
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      animation: fadeIn 0.2s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .modal-card {
      background: white;
      max-width: 400px;
      width: 90%;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 35px -10px black;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    
    .password-wrapper input {
      padding-right: 48px;
    }
    
    .toggle-pwd {
      position: absolute;
      right: 12px;
      cursor: pointer;
      color: #94a3b8;
      background: transparent;
      border: none;
      padding: 8px;
      border-radius: 50%;
      transition: all 0.2s;
    }
    
    .toggle-pwd:hover {
      background: #f1f5f9;
      color: #1e3a8a;
    }
    
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 20px 0;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #e2e8f0;
    }
    
    .divider span {
      padding: 0 12px;
      color: #94a3b8;
      font-size: 0.75rem;
      font-weight: 500;
    }
    
    /* Google Sign-In Button Mobile Fix */
    #googleSignInBtn {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 44px;
      overflow: visible;
    }
    
    #googleSignInBtn > div {
      display: flex;
      justify-content: center;
      width: 100%;
    }
    
    #googleSignInBtn iframe {
      max-width: 100% !important;
      width: auto !important;
      min-width: 250px !important;
      height: 44px !important;
    }
    
    /* Mobile Responsive */
    @media (max-width: 640px) {
      body {
        padding: 12px;
      }
      
      .glass-card {
        border-radius: 24px;
        padding: 20px !important;
      }
      
      .brand-icon {
        width: 60px;
        height: 60px;
        font-size: 1.75rem;
        border-radius: 20px;
      }
      
      h2 {
        font-size: 1.25rem !important;
      }
      
      .input-field {
        padding: 12px 14px;
        font-size: 0.9rem;
      }
      
      .btn-primary,
      .btn-google {
        padding: 12px;
        font-size: 0.9rem;
      }
      
      .tab-btn {
        padding: 10px;
        font-size: 0.8rem;
      }
      
      .toast-notif {
        bottom: 16px;
        font-size: 0.8rem;
        padding: 10px 20px;
        left: 16px;
        right: 16px;
        transform: none;
        width: auto;
        max-width: none;
        border-radius: 32px;
      }
      
      #googleSignInBtn iframe {
        transform: scale(0.98);
        min-width: 220px !important;
      }
    }
    
    @media (max-width: 480px) {
      .glass-card {
        padding: 16px !important;
      }
      
      .space-y-4 > * + * {
        margin-top: 12px !important;
      }
      
      .space-y-3 > * + * {
        margin-top: 10px !important;
      }
      
      #googleSignInBtn iframe {
        transform: scale(0.95);
        min-width: 200px !important;
        margin: -4px 0;
      }
    }
    
    .hidden {
      display: none !important;
    }
    
    /* Utility classes */
    .w-full { width: 100%; }
    .max-w-md { max-width: 28rem; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .text-center { text-align: center; }
    .text-slate-800 { color: #1e293b; }
    .text-slate-500 { color: #64748b; }
    .text-slate-400 { color: #94a3b8; }
    .text-slate-600 { color: #475569; }
    .text-slate-700 { color: #334155; }
    .text-red-600 { color: #dc2626; }
    .text-green-600 { color: #16a34a; }
    .text-blue-700 { color: #1d4ed8; }
    .text-gray-500 { color: #6b7280; }
    .text-gray-400 { color: #9ca3af; }
    .bg-slate-100 { background-color: #f1f5f9; }
    .rounded-xl { border-radius: 0.75rem; }
    .rounded-lg { border-radius: 0.5rem; }
    .font-medium { font-weight: 500; }
    .font-semibold { font-weight: 600; }
    .font-bold { font-weight: 700; }
    .font-extrabold { font-weight: 800; }
    .tracking-tight { letter-spacing: -0.025em; }
    .flex { display: flex; }
    .justify-center { justify-content: center; }
    .justify-between { justify-content: space-between; }
    .items-center { align-items: center; }
    .gap-2 { gap: 8px; }
    .mb-1 { margin-bottom: 4px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 16px; }
    .mb-5 { margin-bottom: 20px; }
    .mb-6 { margin-bottom: 24px; }
    .mt-0 { margin-top: 0; }
    .mt-1 { margin-top: 4px; }
    .mt-2 { margin-top: 8px; }
    .mt-6 { margin-top: 24px; }
    .mr-1 { margin-right: 4px; }
    .mr-2 { margin-right: 8px; }
    .p-1 { padding: 4px; }
    .p-6 { padding: 24px; }
    .py-2 { padding-top: 8px; padding-bottom: 8px; }
    .pt-4 { padding-top: 16px; }
    .border-t { border-top-width: 1px; }
    .border-t { border-top-style: solid; border-top-color: #e2e8f0; }
    .text-xs { font-size: 0.7rem; }
    .text-sm { font-size: 0.8rem; }
    .text-lg { font-size: 1.125rem; }
    .text-xl { font-size: 1.25rem; }
    .text-2xl { font-size: 1.5rem; }
    .hover\:underline:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="w-full max-w-md mx-auto">
  <div class="glass-card p-6 md:p-8">
    <div class="flex justify-center mb-4">
      <div class="brand-icon"><i class="fa-solid fa-bolt"></i></div>
    </div>
    <h2 class="text-2xl font-extrabold text-center text-slate-800 tracking-tight">MOREVA ENERGY</h2>
    <p class="text-center text-slate-500 text-xs mt-1 mb-6">Enterprise Fuel Management · Secure Access</p>

    <!-- Tabs -->
    <div class="flex gap-2 mb-6 bg-slate-100 p-1 rounded-xl">
      <button id="tabLoginBtn" class="tab-btn tab-active" onclick="switchTab('login')">🔐 LOGIN</button>
      <button id="tabSignupBtn" class="tab-btn tab-inactive" onclick="switchTab('signup')">📝 SIGN UP</button>
    </div>

    <!-- LOGIN PANEL -->
    <div id="loginPanel">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1"><i class="fa-regular fa-user mr-1"></i> Username / Email</label>
          <input type="text" id="loginUsername" class="input-field" placeholder="superadmin or email@example.com" autocomplete="off" value="superadmin" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1"><i class="fa-regular fa-lock mr-1"></i> Password</label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" class="input-field" placeholder="Enter your password" />
            <button type="button" class="toggle-pwd" onclick="togglePasswordVisibility('loginPassword', this)"><i class="fa-regular fa-eye-slash"></i></button>
          </div>
        </div>
        <div class="text-right">
          <button onclick="openForgotPasswordModal()" class="text-xs text-blue-700 hover:underline font-medium">🔒 Forgot password?</button>
        </div>
        <button id="loginBtnAction" onclick="performLogin()" class="btn-primary"><i class="fa-regular fa-arrow-right-to-bracket mr-1"></i> Login →</button>
        
        <div class="divider"><span>OR</span></div>
        
        <!-- Google Sign-In Button -->
        <div id="googleSignInBtn"></div>
        
        <div id="loginErrorMsg" class="text-red-600 text-sm text-center mt-2 min-h-[2rem]"></div>
      </div>
    </div>

    <!-- SIGNUP PANEL -->
    <div id="signupPanel" class="hidden">
      <div class="space-y-3">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Full name <span class="text-red-600">*</span></label>
          <input type="text" id="signupFullname" class="input-field" placeholder="John M. Kariuki" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Username <span class="text-red-600">*</span></label>
          <input type="text" id="signupUsername" class="input-field" placeholder="unique_username" autocomplete="off" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Email <span class="text-red-600">*</span></label>
          <input type="email" id="signupEmail" class="input-field" placeholder="john@moreva.com" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Password <span class="text-red-600">*</span></label>
          <div class="password-wrapper">
            <input type="password" id="signupPassword" class="input-field" placeholder="Min. 6 characters" oninput="checkPasswordStrength()" />
            <button type="button" class="toggle-pwd" onclick="togglePasswordVisibility('signupPassword', this)"><i class="fa-regular fa-eye-slash"></i></button>
          </div>
          <div class="strength-meter"><div id="strengthBar" class="strength-bar"></div></div>
          <div id="passwordStrengthText" class="text-xs mt-1 font-medium"></div>
          <div class="password-hint" id="passwordHints">
            <span class="hint-item"><i class="fa-regular fa-circle-check text-gray-400"></i> ≥6 chars</span>
            <span class="hint-item"><i class="fa-regular fa-circle-check text-gray-400"></i> Uppercase</span>
            <span class="hint-item"><i class="fa-regular fa-circle-check text-gray-400"></i> Lowercase</span>
            <span class="hint-item"><i class="fa-regular fa-circle-check text-gray-400"></i> Digit</span>
            <span class="hint-item"><i class="fa-regular fa-circle-check text-gray-400"></i> Special char</span>
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Phone <span class="text-slate-400 text-xs">(optional)</span></label>
          <input type="tel" id="signupPhone" class="input-field" placeholder="+254 7XX XXX XXX" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Address <span class="text-slate-400 text-xs">(optional)</span></label>
          <input type="text" id="signupAddress" class="input-field" placeholder="Nairobi, Kenya" />
        </div>
        <button id="signupBtnAction" onclick="performSignup()" class="btn-primary"><i class="fa-regular fa-pen-to-square mr-1"></i> Register & Request Access</button>
        <div id="signupErrorMsg" class="text-red-600 text-sm text-center mt-1 min-h-[2rem]"></div>
      </div>
    </div>

    <div class="mt-6 text-center text-xs text-slate-400 border-t pt-4">
      <i class="fa-solid fa-shield-haltered mr-1"></i> Role-based access · Admin approval workflow
    </div>
  </div>
</div>

<!-- Forgot Password Modal -->
<div id="forgotModal" class="modal-overlay" style="display: none;">
  <div class="modal-card">
    <div class="flex justify-between items-center mb-4">
      <h3 class="font-bold text-lg text-slate-800"><i class="fa-regular fa-key mr-2"></i>Reset password</h3>
      <button onclick="closeForgotModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
    </div>
    <div id="forgotStep1">
      <p class="text-sm text-slate-600 mb-4">Enter your registered email to receive a reset code.</p>
      <input type="email" id="resetEmail" class="input-field mb-3" placeholder="your@email.com" />
      <button onclick="requestPasswordReset()" class="btn-primary text-sm py-2">Send Reset Code</button>
      <div id="resetRequestMsg" class="text-xs mt-2 text-center"></div>
    </div>
    <div id="forgotStep2" style="display: none;">
      <p class="text-sm text-slate-600 mb-3">Enter the verification code sent to your email</p>
      <input type="text" id="resetCode" class="input-field mb-2" placeholder="Enter 6-digit code" maxlength="6" />
      <div class="password-wrapper mb-2">
        <input type="password" id="newPassword" class="input-field" placeholder="New password (min 6 chars)" />
        <button type="button" class="toggle-pwd" onclick="togglePasswordVisibility('newPassword', this)"><i class="fa-regular fa-eye-slash"></i></button>
      </div>
      <div class="password-wrapper mb-3">
        <input type="password" id="confirmNewPassword" class="input-field" placeholder="Confirm new password" />
        <button type="button" class="toggle-pwd" onclick="togglePasswordVisibility('confirmNewPassword', this)"><i class="fa-regular fa-eye-slash"></i></button>
      </div>
      <button onclick="confirmPasswordReset()" class="btn-primary text-sm py-2">Reset Password</button>
      <div id="resetFinalMsg" class="text-xs mt-2 text-center"></div>
    </div>
  </div>
</div>

<script>
  // ======================= CONFIGURATION =======================
  const API_BASE_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:5000/api'
    : '/api';
  
  let isLoggingIn = false;
  let isSigningUp = false;
  let currentResetEmail = "";
  let mockResetCode = Math.floor(100000 + Math.random() * 900000).toString();

  const GOOGLE_CLIENT_ID = '833977857957-h3rgifh791e5klbd8t1n3hjfg8p9kq5g.apps.googleusercontent.com';

  function showToast(msg, type = "success") {
    const existingToast = document.querySelector('.toast-notif');
    if (existingToast) existingToast.remove();
    
    const toast = document.createElement("div");
    toast.className = "toast-notif";
    toast.style.background = type === "error" ? "#dc2626" : type === "warning" ? "#d97706" : "#0f3b3f";
    toast.innerHTML = `<i class="fa-solid ${type === "error" ? "fa-circle-exclamation" : type === "warning" ? "fa-triangle-exclamation" : "fa-circle-check"} mr-2"></i> ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }

  window.togglePasswordVisibility = function(inputId, btnElement) {
    const input = document.getElementById(inputId);
    if (!input) return;
    const icon = btnElement.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.remove('fa-eye-slash');
      icon.classList.add('fa-eye');
    } else {
      input.type = 'password';
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-eye-slash');
    }
  }

  function checkPasswordStrength() {
    const pwd = document.getElementById("signupPassword").value;
    const strengthBar = document.getElementById("strengthBar");
    const strengthText = document.getElementById("passwordStrengthText");
    const checks = {
      length: pwd.length >= 6,
      upper: /[A-Z]/.test(pwd),
      lower: /[a-z]/.test(pwd),
      digit: /\d/.test(pwd),
      special: /[!@#$%^&*(),.?":{}|<>]/.test(pwd)
    };
    const hintItems = document.querySelectorAll("#passwordHints .hint-item");
    const keys = ["length", "upper", "lower", "digit", "special"];
    keys.forEach((key, idx) => {
      if (hintItems[idx]) {
        const iconElem = hintItems[idx].querySelector("i");
        if (checks[key]) {
          iconElem.className = "fa-regular fa-circle-check text-green-600";
        } else {
          iconElem.className = "fa-regular fa-circle-xmark text-gray-400";
        }
      }
    });
    let score = Object.values(checks).filter(Boolean).length;
    let width = (score / 5) * 100;
    strengthBar.style.width = width + "%";
    if (score <= 2) {
      strengthBar.style.backgroundColor = "#dc2626";
      strengthText.innerText = "Weak password";
      strengthText.style.color = "#dc2626";
    } else if (score <= 3) {
      strengthBar.style.backgroundColor = "#f59e0b";
      strengthText.innerText = "Medium password";
      strengthText.style.color = "#f59e0b";
    } else if (score <= 4) {
      strengthBar.style.backgroundColor = "#3b82f6";
      strengthText.innerText = "Strong password";
      strengthText.style.color = "#3b82f6";
    } else {
      strengthBar.style.backgroundColor = "#10b981";
      strengthText.innerText = "Very strong password";
      strengthText.style.color = "#10b981";
    }
    if (pwd === "") {
      strengthBar.style.width = "0%";
      strengthText.innerText = "";
    }
  }

  function setLoginLoading(loading) {
    const btn = document.getElementById("loginBtnAction");
    if (loading) {
      btn.disabled = true;
      btn.innerHTML = 'Authenticating <span class="loading-spinner"></span>';
    } else {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-regular fa-arrow-right-to-bracket mr-1"></i> Login →';
    }
  }

  function setSignupLoading(loading) {
    const btn = document.getElementById("signupBtnAction");
    if (loading) {
      btn.disabled = true;
      btn.innerHTML = 'Submitting <span class="loading-spinner"></span>';
    } else {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-regular fa-pen-to-square mr-1"></i> Register & Request Access';
    }
  }

  window.switchTab = function(tab) {
    const loginPanel = document.getElementById("loginPanel");
    const signupPanel = document.getElementById("signupPanel");
    const tabLogin = document.getElementById("tabLoginBtn");
    const tabSignup = document.getElementById("tabSignupBtn");
    if (tab === "login") {
      loginPanel.classList.remove("hidden");
      signupPanel.classList.add("hidden");
      tabLogin.classList.remove("tab-inactive");
      tabLogin.classList.add("tab-active");
      tabSignup.classList.remove("tab-active");
      tabSignup.classList.add("tab-inactive");
      document.getElementById("loginErrorMsg").innerHTML = "";
    } else {
      loginPanel.classList.add("hidden");
      signupPanel.classList.remove("hidden");
      tabSignup.classList.remove("tab-inactive");
      tabSignup.classList.add("tab-active");
      tabLogin.classList.remove("tab-active");
      tabLogin.classList.add("tab-inactive");
      document.getElementById("signupErrorMsg").innerHTML = "";
      checkPasswordStrength();
    }
  }

  // Fixed Google Sign-In for mobile
  function initGoogleSignIn() {
    if (typeof google === 'undefined') {
      setTimeout(initGoogleSignIn, 500);
      return;
    }
    
    try {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleCredentialResponse,
        auto_select: false,
        cancel_on_tap_outside: true
      });
      
      const googleBtn = document.getElementById("googleSignInBtn");
      if (googleBtn) {
        googleBtn.innerHTML = '';
        
        // Calculate width based on screen size
        let buttonWidth = 400;
        if (window.innerWidth < 480) {
          buttonWidth = 280;
        } else if (window.innerWidth < 640) {
          buttonWidth = 320;
        }
        
        google.accounts.id.renderButton(
          googleBtn,
          { 
            theme: "outline", 
            size: "large", 
            text: "continue_with",
            width: buttonWidth,
            shape: "rectangular"
          }
        );
        
        // Style the iframe for responsiveness
        setTimeout(() => {
          const iframe = googleBtn.querySelector('iframe');
          if (iframe) {
            iframe.style.width = '100%';
            iframe.style.maxWidth = buttonWidth + 'px';
            iframe.style.display = 'block';
            iframe.style.margin = '0 auto';
          }
        }, 50);
      }
    } catch (error) {
      console.error('Google Sign-In error:', error);
      const googleBtn = document.getElementById("googleSignInBtn");
      if (googleBtn) {
        googleBtn.innerHTML = '<button class="btn-google" onclick="alert(\'Google Sign-In requires configuration. Please contact admin.\')"><i class="fa-brands fa-google"></i> Sign in with Google</button>';
      }
    }
  }

  // Handle window resize for Google button
  window.addEventListener('resize', function() {
    const googleBtn = document.getElementById("googleSignInBtn");
    if (googleBtn && googleBtn.querySelector('iframe')) {
      let buttonWidth = 400;
      if (window.innerWidth < 480) {
        buttonWidth = 280;
      } else if (window.innerWidth < 640) {
        buttonWidth = 320;
      }
      const iframe = googleBtn.querySelector('iframe');
      if (iframe) {
        iframe.style.maxWidth = buttonWidth + 'px';
      }
    }
  });

  async function handleGoogleCredentialResponse(response) {
    showToast("Authenticating with Google...", "info");
    
    try {
      const res = await fetch(`${API_BASE_URL}/auth/google`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ credential: response.credential })
      });
      
      const data = await res.json();
      
      if (res.ok && data.token) {
        const user = data.user;
        if (!user.is_active && user.role !== "super_admin") {
          showToast("Your account is pending admin approval.", "warning");
          return;
        }
        localStorage.setItem("moreva_token", data.token);
        localStorage.setItem("moreva_user", JSON.stringify(user));
        showToast(`Welcome ${user.full_name || user.username}! Redirecting...`, "success");
        setTimeout(() => {
          window.location.href = (user.role === "super_admin" || user.role === "admin") ? "/admin.html" : "/dashboard.html";
        }, 1000);
      } else {
        throw new Error(data.error || "Google sign-in failed");
      }
    } catch (err) {
      console.error("Google auth error:", err);
      document.getElementById("loginErrorMsg").innerHTML = err.message || "Google authentication failed.";
      showToast(err.message || "Google authentication failed", "error");
    }
  }

  async function performLogin() {
    if (isLoggingIn) return;
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;
    if (!username || !password) {
      document.getElementById("loginErrorMsg").innerHTML = "❌ Please enter username/email and password";
      return;
    }
    isLoggingIn = true;
    setLoginLoading(true);
    document.getElementById("loginErrorMsg").innerHTML = "";
    try {
      const response = await fetch(`${API_BASE_URL}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });
      const data = await response.json();
      if (response.ok && data.token) {
        const user = data.user;
        if (!user.is_active && user.role !== "super_admin") {
          document.getElementById("loginErrorMsg").innerHTML = "⏳ Your account is pending admin approval.";
          showToast("Account pending approval.", "warning");
          setLoginLoading(false);
          isLoggingIn = false;
          return;
        }
        localStorage.setItem("moreva_token", data.token);
        localStorage.setItem("moreva_user", JSON.stringify(user));
        showToast(`Welcome back, ${user.full_name || user.username}!`, "success");
        setTimeout(() => {
          window.location.href = (user.role === "super_admin" || user.role === "admin") ? "/admin.html" : "/dashboard.html";
        }, 1000);
      } else {
        document.getElementById("loginErrorMsg").innerHTML = data.error || "Invalid credentials";
      }
    } catch (err) {
      console.error(err);
      document.getElementById("loginErrorMsg").innerHTML = "⚠️ Cannot connect to server. Please try again.";
      showToast("Connection failed", "error");
    } finally {
      isLoggingIn = false;
      setLoginLoading(false);
    }
  }

  async function performSignup() {
    if (isSigningUp) return;
    const fullName = document.getElementById("signupFullname").value.trim();
    const username = document.getElementById("signupUsername").value.trim();
    const email = document.getElementById("signupEmail").value.trim();
    const password = document.getElementById("signupPassword").value;
    const phone = document.getElementById("signupPhone").value.trim();
    const address = document.getElementById("signupAddress").value.trim();

    if (!fullName || !username || !email || !password) {
      document.getElementById("signupErrorMsg").innerHTML = "❌ Please fill all required fields";
      return;
    }
    if (password.length < 6) {
      document.getElementById("signupErrorMsg").innerHTML = "❌ Password must be at least 6 characters";
      return;
    }
    if (!email.includes("@")) {
      document.getElementById("signupErrorMsg").innerHTML = "❌ Please enter a valid email address";
      return;
    }
    isSigningUp = true;
    setSignupLoading(true);
    document.getElementById("signupErrorMsg").innerHTML = "";
    try {
      const response = await fetch(`${API_BASE_URL}/auth/signup`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          full_name: fullName,
          username: username,
          email: email,
          password: password,
          phone: phone || null,
          address: address || null,
          role: "staff",
        }),
      });
      const data = await response.json();
      if (response.status === 201 || response.ok) {
        showToast("✅ Registration successful! Pending admin approval.", "success");
        document.getElementById("signupFullname").value = "";
        document.getElementById("signupUsername").value = "";
        document.getElementById("signupEmail").value = "";
        document.getElementById("signupPassword").value = "";
        document.getElementById("signupPhone").value = "";
        document.getElementById("signupAddress").value = "";
        checkPasswordStrength();
        setTimeout(() => {
          switchTab("login");
          showToast("Please login after admin approval", "info");
        }, 2000);
      } else {
        document.getElementById("signupErrorMsg").innerHTML = data.error || "Registration failed";
        showToast(data.error || "Registration failed", "error");
      }
    } catch (err) {
      console.error("Signup error:", err);
      document.getElementById("signupErrorMsg").innerHTML = "Server error. Please try again.";
      showToast("Server error", "error");
    } finally {
      isSigningUp = false;
      setSignupLoading(false);
    }
  }

  window.openForgotPasswordModal = function() {
    document.getElementById("forgotModal").style.display = "flex";
    document.getElementById("forgotStep1").style.display = "block";
    document.getElementById("forgotStep2").style.display = "none";
    document.getElementById("resetRequestMsg").innerHTML = "";
    document.getElementById("resetFinalMsg").innerHTML = "";
    document.getElementById("resetEmail").value = "";
    document.getElementById("resetCode").value = "";
    document.getElementById("newPassword").value = "";
    document.getElementById("confirmNewPassword").value = "";
    mockResetCode = Math.floor(100000 + Math.random() * 900000).toString();
  }

  window.closeForgotModal = function() {
    document.getElementById("forgotModal").style.display = "none";
  }

  window.requestPasswordReset = async function() {
    const email = document.getElementById("resetEmail").value.trim();
    if (!email) {
      document.getElementById("resetRequestMsg").innerHTML = "❌ Please enter your email";
      document.getElementById("resetRequestMsg").style.color = "#dc2626";
      return;
    }
    try {
      const response = await fetch(`${API_BASE_URL}/forgot-password`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });
      const data = await response.json();
      if (response.ok) {
        currentResetEmail = email;
        if (data.resetCode) mockResetCode = data.resetCode;
        document.getElementById("resetRequestMsg").innerHTML = "✅ Reset code sent! Check your email.";
        document.getElementById("resetRequestMsg").style.color = "#10b981";
        document.getElementById("forgotStep1").style.display = "none";
        document.getElementById("forgotStep2").style.display = "block";
      } else {
        document.getElementById("resetRequestMsg").innerHTML = data.error || "Email not found";
        document.getElementById("resetRequestMsg").style.color = "#dc2626";
      }
    } catch(e) {
      showToast(`Demo mode: Reset code sent to ${email}`, "success");
      currentResetEmail = email;
      document.getElementById("resetRequestMsg").innerHTML = "✅ Demo: Code sent!";
      document.getElementById("resetRequestMsg").style.color = "#10b981";
      document.getElementById("forgotStep1").style.display = "none";
      document.getElementById("forgotStep2").style.display = "block";
    }
  }

  window.confirmPasswordReset = async function() {
    const code = document.getElementById("resetCode").value.trim();
    const newPwd = document.getElementById("newPassword").value;
    const confirmPwd = document.getElementById("confirmNewPassword").value;
    
    if (code !== mockResetCode) {
      document.getElementById("resetFinalMsg").innerHTML = "❌ Invalid verification code";
      document.getElementById("resetFinalMsg").style.color = "#dc2626";
      return;
    }
    if (newPwd.length < 6) {
      document.getElementById("resetFinalMsg").innerHTML = "❌ Password must be at least 6 characters";
      document.getElementById("resetFinalMsg").style.color = "#dc2626";
      return;
    }
    if (newPwd !== confirmPwd) {
      document.getElementById("resetFinalMsg").innerHTML = "❌ Passwords do not match";
      document.getElementById("resetFinalMsg").style.color = "#dc2626";
      return;
    }
    
    try {
      const response = await fetch(`${API_BASE_URL}/reset-password`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: currentResetEmail, new_password: newPwd, reset_code: code }),
      });
      if (response.ok) {
        showToast("✅ Password reset successful! Please login.", "success");
        closeForgotModal();
        setTimeout(() => switchTab("login"), 500);
      } else {
        throw new Error("Reset failed");
      }
    } catch (err) {
      showToast("✅ Demo: Password reset simulated. You can now log in.", "success");
      closeForgotModal();
    }
  }

  // Auto login check
  const storedToken = localStorage.getItem("moreva_token");
  const storedUserRaw = localStorage.getItem("moreva_user");
  let storedUser = null;
  try { if (storedUserRaw) storedUser = JSON.parse(storedUserRaw); } catch(e) {}
  if (storedToken && storedUser) {
    fetch(`${API_BASE_URL}/verify`, {
      headers: { Authorization: `Bearer ${storedToken}` },
    })
      .then(res => {
        if (res.ok) return res.json();
        else throw new Error("invalid token");
      })
      .then(data => {
        if (data.user && data.user.is_active === false && data.user.role !== "super_admin") {
          localStorage.removeItem("moreva_token");
          localStorage.removeItem("moreva_user");
          showToast("Account pending approval", "warning");
          return;
        }
        window.location.href = (storedUser.role === "super_admin" || storedUser.role === "admin") ? "/admin.html" : "/dashboard.html";
      })
      .catch(err => {
        console.warn("Auto-verify failed", err);
        localStorage.removeItem("moreva_token");
        localStorage.removeItem("moreva_user");
      });
  }

  document.getElementById("loginPassword")?.addEventListener("keypress", (e) => { if (e.key === "Enter") performLogin(); });
  document.getElementById("signupPassword")?.addEventListener("keypress", (e) => { if (e.key === "Enter") performSignup(); });
  
  window.checkPasswordStrength = checkPasswordStrength;
  switchTab('login');
  window.addEventListener('load', initGoogleSignIn);
</script>
</body>
